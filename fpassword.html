<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="stylesheet" href="style/all.css">
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body class="bg-black flex items-center justify-center min-h-screen">
        <div class="w-full max-w-md relative">

        <!-- Email Form -->
        <form id="emailForm"
            class="bg-gray-900 border border-yellow-500 flex flex-col gap-5 p-8 rounded-2xl shadow-lg transition-all duration-500">

            <h3 class="text-3xl text-center font-bold text-white mb-4">
                Enter your account email
            </h3>

            <div class="flex flex-col gap-1">
                <label class="text-gray-300 text-sm">Email</label>
                <input id="emailInput" type="email" placeholder="Enter your email"
                    class="p-3 rounded-xl bg-gray-800 text-white border border-gray-700 
                    focus:outline-none focus:ring-2 focus:ring-yellow-600">
            </div>

            <button type="submit"
                class="bg-yellow-600 hover:bg-yellow-500 text-black font-semibold py-3 rounded-xl transition shadow-md">
                Continue
            </button>
        </form>


        <!-- Password Form -->
        <form id="passwordForm"
            class="bg-gray-900 border border-yellow-500 flex flex-col gap-5 p-8 rounded-2xl shadow-lg 
            absolute top-0 left-0 w-full opacity-0 pointer-events-none transition-all duration-500">

            <h3 class="text-3xl text-center font-bold text-white mb-4">
                Change Password
            </h3>

            <!-- Name (verify identity) -->
            <div class="flex flex-col gap-1 relative">
                <label class="text-gray-300 text-sm">Name</label>
                <input id="nameInput" type="text" placeholder="Enter your name"
                    class="p-3 pr-10 rounded-xl bg-gray-800 text-white border border-gray-700 focus:ring-2 focus:ring-yellow-600" required>
            </div>

            <!-- New Password -->
            <div class="flex flex-col gap-1 relative">
                <label class="text-gray-300 text-sm">New Password</label>
                <input id="newPassword" type="password" placeholder="New Password"
                    class="p-3 pr-10 rounded-xl bg-gray-800 text-white border border-gray-700 focus:ring-2 focus:ring-yellow-600" required>
                <i class="toggle-eye fa-regular fa-eye absolute right-3 top-10 text-gray-400 cursor-pointer"></i>
            </div>

            <button
                class="bg-yellow-600 hover:bg-yellow-500 text-black font-semibold py-3 rounded-xl transition shadow-md">
                Change Password
            </button>
        </form>

    </div>
    
    <!-- JS -->
    <script type="module" src="./script/fpasswordscript.js"></script>
</body>
</html>
