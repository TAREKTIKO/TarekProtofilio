    <style>
        /* ===== DETAILS PAGE STYLES ===== */
        .detail-hero-bg {
            background: radial-gradient(ellipse 70% 40% at 50% 0%, rgba(245,158,11,0.1) 0%, transparent 60%),
                        linear-gradient(to bottom, #000, #111827);
        }

        /* Image carousel */
        .gallery-track {
            display: flex;
            transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .gallery-slide {
            min-width: 100%;
            position: relative;
        }
        .gallery-slide img {
            width: 100%;
            height: 420px;
            object-fit: cover;
            cursor: pointer;
            border-radius: 1rem;
        }
        @media (max-width: 768px) {
            .gallery-slide img { height: 220px; }
        }

        /* Gallery nav buttons */
        .gallery-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 5;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(245,158,11,0.4);
            color: #f59e0b;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
        }
        .gallery-btn:hover {
            background: rgba(245,158,11,0.2);
            border-color: #f59e0b;
        }
        .gallery-btn-prev { left: 12px; }
        .gallery-btn-next { right: 12px; }

        /* Thumbnail strip */
        .thumb {
            width: 72px;
            height: 52px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            opacity: 0.6;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .thumb:hover { opacity: 0.9; border-color: rgba(245,158,11,0.5); }
        .thumb.active { opacity: 1; border-color: #f59e0b; }

        /* Fullscreen lightbox */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
        }
        #lightbox.show { display: flex; }
        #lightboxImg {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
        }

        /* Content section card */
        .section-card {
            background: rgba(17,24,39,0.9);
            border: 1px solid rgba(75,85,99,0.4);
            border-radius: 1rem;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .section-card:hover {
            border-color: rgba(245,158,11,0.3);
        }

        /* Collapsed description */
        .section-desc {
            position: relative;
            transition: max-height 0.4s ease;
            overflow: hidden;
        }
        .section-desc.collapsed {
            max-height: 90px;
        }
        .section-desc.collapsed::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 48px;
            background: linear-gradient(transparent, rgba(17,24,39,0.95));
        }

        /* Code block */
        .code-block-wrapper {
            position: relative;
            border-radius: 0.75rem;
            overflow: hidden;
            border: 1px solid rgba(75,85,99,0.5);
        }
        .code-block-wrapper pre[class*="language-"] {
            margin: 0;
            border-radius: 0;
            font-size: 0.8rem;
            max-height: 380px;
            overflow-y: auto;
        }
        .code-block-wrapper pre[class*="language-"].collapsed {
            max-height: 160px;
        }
        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(30,41,59,0.9);
            border: 1px solid rgba(75,85,99,0.6);
            color: #9ca3af;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.72rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
            z-index: 2;
        }
        .copy-btn:hover {
            background: rgba(245,158,11,0.15);
            border-color: rgba(245,158,11,0.5);
            color: #f59e0b;
        }
        .copy-btn.copied { color: #22c55e; border-color: rgba(34,197,94,0.4); }

        /* Tech badge */
        .tech-badge {
            font-size: 0.65rem;
            padding: 3px 10px;
            border-radius: 999px;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        /* Link action buttons */
        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.78rem;
            font-weight: 600;
            transition: all 0.2s;
            border: 1px solid transparent;
            white-space: nowrap;
        }
        .action-btn-primary {
            background: rgba(245,158,11,0.15);
            border-color: rgba(245,158,11,0.4);
            color: #f59e0b;
        }
        .action-btn-primary:hover { background: rgba(245,158,11,0.25); border-color: #f59e0b; }
        .action-btn-secondary {
            background: rgba(75,85,99,0.2);
            border-color: rgba(75,85,99,0.5);
            color: #9ca3af;
        }
        .action-btn-secondary:hover { background: rgba(75,85,99,0.3); border-color: #9ca3af; color: white; }

        /* Related card */
        .related-card {
            background: rgba(17,24,39,0.85);
            border: 1px solid rgba(75,85,99,0.4);
            border-radius: 1rem;
            overflow: hidden;
            transition: all 0.25s;
        }
        .related-card:hover {
            border-color: rgba(245,158,11,0.4);
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }

        /* Shimmer skeleton */
        @keyframes shimmer {
            0%   { background-position: -468px 0; }
            100% { background-position: 468px 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #1f2937 25%, #374151 50%, #1f2937 75%);
            background-size: 468px 100%;
            animation: shimmer 1.4s infinite linear;
            border-radius: 0.5rem;
        }

        /* Favorite button */
        @keyframes favPulse { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }
        .fav-pulse { animation: favPulse 0.35s ease; }
