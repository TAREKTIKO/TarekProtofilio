<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold:        #f5c842;
            --gold-dim:    #c9a227;
            --gold-glow:   rgba(245, 200, 66, 0.18);
            --bg:          #080808;
            --surface:     rgba(255,255,255,0.04);
            --border:      rgba(245, 200, 66, 0.18);
            --border-hover:rgba(245, 200, 66, 0.45);
            --text:        #f0f0f0;
            --muted:       #888;
            --red:         #f87171;
            --green:       #4ade80;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* ── Background particles & gradient ── */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(245,200,66,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 90% 100%, rgba(245,200,66,0.07) 0%, transparent 60%);
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(245,200,66,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(245,200,66,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* ── Floating orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: drift 12s ease-in-out infinite alternate;
            z-index: 0;
            pointer-events: none;
        }
        .orb-1 { width: 420px; height: 420px; top: -120px; left: -80px;  background: rgba(245,200,66,0.25); animation-duration: 14s; }
        .orb-2 { width: 300px; height: 300px; bottom: -80px; right: -60px; background: rgba(245,200,66,0.18); animation-duration: 10s; animation-delay: -4s; }
        .orb-3 { width: 200px; height: 200px; top: 40%; left: 60%;  background: rgba(200,160,30,0.12); animation-duration: 18s; animation-delay: -8s; }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(30px, 20px) scale(1.06); }
        }

        /* ── Page layout ── */
        .page {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        /* ── Card ── */
        .card {
            width: 100%;
            max-width: 440px;
            background: rgba(12,12,12,0.80);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 44px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 32px 80px rgba(0,0,0,0.6),
                0 0 60px var(--gold-glow);
            animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }

        /* ── Logo / header ── */
        .logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 36px;
        }

        .shield-icon {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(245,200,66,0.15), rgba(245,200,66,0.05));
            border: 1px solid var(--border-hover);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--gold);
            position: relative;
            box-shadow: 0 0 30px rgba(245,200,66,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 30px rgba(245,200,66,0.2), inset 0 1px 0 rgba(255,255,255,0.08); }
            50%       { box-shadow: 0 0 50px rgba(245,200,66,0.38), inset 0 1px 0 rgba(255,255,255,0.12); }
        }

        .card-title {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #fff;
            text-align: center;
        }

        .card-subtitle {
            font-size: 13.5px;
            color: var(--muted);
            text-align: center;
            margin-top: 4px;
            line-height: 1.5;
        }

        /* ── Badge ── */
        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(245,200,66,0.1);
            border: 1px solid rgba(245,200,66,0.3);
            border-radius: 100px;
            padding: 4px 14px;
            font-size: 11.5px;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 0.6px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 12.5px;
            font-weight: 600;
            color: #bbb;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 14px;
            pointer-events: none;
            transition: color 0.2s;
        }

        input {
            width: 100%;
            padding: 13px 44px 13px 44px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 14.5px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
        }

        input::placeholder { color: #555; }

        input:focus {
            border-color: rgba(245,200,66,0.5);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 0 3px rgba(245,200,66,0.1);
        }

        input:focus + .input-icon,
        .input-wrap:focus-within .input-icon { color: var(--gold); }

        .toggle-pass {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 14px;
            cursor: pointer;
            transition: color 0.2s;
            border: none;
            background: none;
            padding: 0;
        }
        .toggle-pass:hover { color: var(--gold); }

        /* ── Submit button ── */
        .btn-submit {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dim));
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            box-shadow: 0 4px 24px rgba(245,200,66,0.35);
            letter-spacing: 0.2px;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(245,200,66,0.5);
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .spinner {
            display: none;
            width: 17px;
            height: 17px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.65s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Message box ── */
        .message-box {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            margin-top: 16px;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

        .message-box.error {
            background: rgba(248,113,113,0.1);
            border: 1px solid rgba(248,113,113,0.3);
            color: var(--red);
        }

        .message-box.success {
            background: rgba(74,222,128,0.1);
            border: 1px solid rgba(74,222,128,0.3);
            color: var(--green);
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin: 28px 0 20px;
        }

        /* ── Footer hint ── */
        .footer-hint {
            text-align: center;
            font-size: 12px;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* ── Shake animation for wrong creds ── */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%       { transform: translateX(-8px); }
            40%       { transform: translateX(8px); }
            60%       { transform: translateX(-5px); }
            80%       { transform: translateX(5px); }
        }
        .shake { animation: shake 0.4s ease; }
    </style>
</head>
<body>

    <!-- Background layers -->
    <div class="bg-layer"></div>
    <div class="grid-overlay"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Main content -->
    <div class="page">
        <div class="card" id="loginCard">

            <!-- Header -->
            <div class="logo-wrap">
                <div class="shield-icon">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <div>
                    <div class="card-title">Admin Access</div>
                    <div class="card-subtitle">Restricted area — authorized personnel only</div>
                </div>
                <span class="admin-badge">
                    <i class="fa-solid fa-circle" style="font-size:7px;"></i>
                    Secure Login
                </span>
            </div>

            <!-- Form -->
            <form id="adminLoginForm" novalidate autocomplete="off">

                <!-- Email -->
                <div class="form-group">
                    <label for="adminEmail">Email Address</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input
                            type="email"
                            id="adminEmail"
                            placeholder="admin@example.com"
                            autocomplete="username"
                            required
                        >
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input
                            type="password"
                            id="adminPassword"
                            placeholder="••••••••••"
                            autocomplete="current-password"
                            required
                        >
                        <button type="button" class="toggle-pass" id="toggleAdminPass" tabindex="-1" aria-label="Toggle password visibility">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Submit -->
                <button class="btn-submit" type="submit" id="adminLoginSubmit">
                    <span id="btnSpinner" class="spinner"></span>
                    <span id="btnText">Sign In to Dashboard</span>
                    <i class="fa-solid fa-arrow-right-to-bracket" id="btnIcon"></i>
                </button>

                <!-- Message -->
                <div class="message-box" id="adminLoginMessage" role="alert">
                    <i class="fa-solid fa-circle-info"></i>
                    <span id="messageText"></span>
                </div>

            </form>

            <div class="divider"></div>

            <!-- Footer -->
            <div class="footer-hint">
                <i class="fa-solid fa-lock" style="font-size:11px; color:#444;"></i>
                Protected by role-based access control
            </div>

        </div>
    </div>

    <!-- Supabase + Login Script -->
    <script type="module" src="./script/supabase.js"></script>
    <script type="module" src="./script/adminLoginScript.js"></script>

</body>
</html>
